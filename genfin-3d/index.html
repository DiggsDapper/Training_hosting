<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENFIN 3D - Loan Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e1a;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        /* HEADER */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(10, 14, 26, 0.98) 0%, rgba(10, 14, 26, 0.85) 100%);
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
            padding: 12px 20px;
            z-index: 101;
            pointer-events: all;
        }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        .logo-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
        }
        
        .nav-menu {
            display: flex;
            gap: 25px;
        }
        
        .nav-item {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #aaa;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        
        .nav-item.active {
            background: rgba(102, 126, 234, 0.3);
            color: #667eea;
        }
        
        .time-display {
            font-size: 11px;
            color: #888;
            font-weight: 600;
        }
        
        .tab-group {
            display: flex;
            gap: 8px;
        }
        
        .tab {
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.25);
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s;
            color: #aaa;
        }
        
        .tab:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.4);
        }
        
        .tab.active {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        
        .tab.escalation {
            background: #ff4757;
            border-color: #ff4757;
            color: #fff;
        }
        
        /* LEFT SIDEBAR */
        .left-sidebar {
            position: absolute;
            left: 0;
            top: 60px;
            bottom: 0;
            width: 55px;
            background: linear-gradient(90deg, rgba(10, 14, 26, 0.95) 0%, rgba(10, 14, 26, 0.8) 100%);
            border-right: 1px solid rgba(102, 126, 234, 0.2);
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 99;
            pointer-events: all;
        }
        
        .sidebar-item {
            width: 40px;
            height: 35px;
            margin: 0 auto;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            color: #aaa;
        }
        
        .sidebar-item:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.4);
        }
        
        .sidebar-item.active {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        
        /* RIGHT INFO PANEL */
        .right-panel {
            position: absolute;
            right: 15px;
            top: 75px;
            width: 260px;
            background: rgba(20, 30, 48, 0.92);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 4px;
            padding: 15px;
            z-index: 99;
            pointer-events: all;
            max-height: 350px;
            overflow-y: auto;
            font-size: 11px;
        }
        
        .panel-header {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .panel-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }
        
        .stat-label {
            color: #999;
            font-weight: 500;
        }
        
        .stat-value {
            color: #667eea;
            font-weight: 600;
        }
        
        /* BOTTOM CONTROLS */
        .bottom-controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 99;
            pointer-events: all;
        }
        
        .control-btn {
            width: 36px;
            height: 36px;
            background: rgba(102, 126, 234, 0.8);
            border: 1px solid rgba(102, 126, 234, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            color: #fff;
        }
        
        .control-btn:hover {
            background: #667eea;
            border-color: #667eea;
            transform: scale(1.1);
        }
        
        /* SCROLLBAR STYLING */
        ::-webkit-scrollbar {
            width: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(102, 126, 234, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui-overlay">
        <!-- HEADER -->
        <div class="header">
            <div class="header-row">
                <div class="logo">
                    <div class="logo-icon">G</div>
                    <span>GENFIN</span>
                </div>
                <div class="nav-menu">
                    <div class="nav-item active">TASKS</div>
                    <div class="nav-item">WORKFLOW</div>
                    <div class="nav-item">PAGE TASKS</div>
                    <div class="nav-item">HELP</div>
                </div>
                <div class="time-display">58:29</div>
            </div>
            <div class="header-row">
                <div class="tab-group">
                    <div class="tab active">QUEUES</div>
                    <div class="tab">EMAILS</div>
                    <div class="tab escalation">ESCALATIONS</div>
                </div>
            </div>
        </div>
        
        <!-- LEFT SIDEBAR -->
        <div class="left-sidebar">
            <div class="sidebar-item active">📋</div>
            <div class="sidebar-item">✉️</div>
            <div class="sidebar-item">⚠️</div>
        </div>
        
        <!-- RIGHT INFO PANEL -->
        <div class="right-panel">
            <div class="panel-header">🔍 Queue Info</div>
            <div class="panel-stat">
                <span class="stat-label">Current Items</span>
                <span class="stat-value">200</span>
            </div>
            <div class="panel-stat">
                <span class="stat-label">Collection</span>
                <span class="stat-value">22 Oct 2025</span>
            </div>
            <div class="panel-stat">
                <span class="stat-label">Queue Status</span>
                <span class="stat-value">206 Days</span>
            </div>
            <div class="panel-stat">
                <span class="stat-label">Load Balance</span>
                <span class="stat-value">84%</span>
            </div>
            <div class="panel-stat">
                <span class="stat-label">Priority</span>
                <span class="stat-value">High</span>
            </div>
            <div class="panel-stat">
                <span class="stat-label">Next Refresh</span>
                <span class="stat-value">28 sec</span>
            </div>
        </div>
        
        <!-- BOTTOM CONTROLS -->
        <div class="bottom-controls">
            <button class="control-btn" title="Rotate 90°">🔄</button>
            <button class="control-btn" title="Reset View">🏠</button>
            <button class="control-btn" title="Export">📊</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
